{% extends "layout.html" %}
{% block content %}
<h2>Your Gallery</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Photo title" required>
    <input type="file" name="photo" required>
    <button type="submit">Add Photo</button>
</form>

<h3>Photos</h3>
<div class="gallery">
    {% for photo in photos %}
    <div class="photo">
        <img src="{{ url_for('static', filename='images/' + photo[1]) }}" width="150">
        <p>{{ photo[2] }}</p>
        <a href="{{ url_for('delete', photo_id=photo[0]) }}">Delete</a>
    </div>
    {% endfor %}
</div>

<h3>Registered Users</h3>
<ul>
    {% for user in users %}
    <li>{{ user[1] }} (ID: {{ user[0] }})</li>
    {% endfor %}
</ul>

<p><a href="{{ url_for('logout') }}">Logout</a></p>
{% endblock %}
